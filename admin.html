<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Portfolio Administration</title>

  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <header class="admin-header">
    <div>
      <h1>Portfolio Administration</h1>
      <p>Manage the projects displayed on your portfolio.</p>
    </div>

    <button id="logout-button" type="button">
      Logout
    </button>
  </header>

  <main class="admin-container">

    <section class="admin-form-section">
      <h2 id="form-heading">Add Project</h2>

      <form id="project-form">
        <input id="project-id" type="hidden">

        <label for="title">Project title</label>
        <input id="title" type="text" required>

        <label for="short-description">
          Short description
        </label>
        <textarea
          id="short-description"
          rows="4"
          required
        ></textarea>

        <label for="full-description">
          Full description
        </label>
        <textarea
          id="full-description"
          rows="6"
        ></textarea>

        <label for="technologies">Technologies</label>
        <input
          id="technologies"
          type="text"
          placeholder="HTML · CSS · JavaScript"
          required
        >

        <label for="image-url">Image URL</label>
        <input
          id="image-url"
          type="text"
          placeholder="images/project.png"
        >

        <label for="github-url">GitHub URL</label>
        <input id="github-url" type="url">

        <label for="live-url">Live project URL</label>
        <input id="live-url" type="url">

        <label for="status">Status</label>
        <select id="status" required>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
        </select>

        <label for="display-order">Display order</label>
        <input
          id="display-order"
          type="number"
          min="0"
          value="0"
          required
        >

        <div class="form-buttons">
          <button id="save-button" type="submit">
            Save Project
          </button>

          <button
            id="cancel-edit-button"
            type="button"
            hidden
          >
            Cancel Edit
          </button>
        </div>

        <p id="form-message"></p>
      </form>
    </section>

    <section class="project-management-section">
      <h2>Existing Projects</h2>

      <div id="admin-projects-container">
        <p>Loading projects...</p>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
